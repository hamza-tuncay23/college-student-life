<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login | College Student Life</title>

    <link rel="stylesheet"
          href="assets/css/variables.css">

    <link rel="stylesheet"
          href="assets/css/auth.css">

</head>

<body>

<div class="auth-container">

    <div class="auth-card">

        <h1>Welcome Back</h1>

        <p>Sign in to continue.</p>

        <input
            type="email"
            id="email"
            placeholder="Email">

        <input
            type="password"
            id="password"
            placeholder="Password">

        <button id="loginButton">

            Login

        </button>

        <p id="errorMessage"></p>

        <div class="auth-links">

            <a href="signup.html">

                Create account

            </a>

            <a href="forgot-password.html">

                Forgot password?

            </a>

        </div>

    </div>

</div>

<script type="module"
        src="assets/js/core/login.js"></script>

</body>

</html>
