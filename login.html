<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>College Student Life</title>

    <link rel="stylesheet" href="assets/css/variables.css">
    <link rel="stylesheet" href="assets/css/auth.css">

</head>

<body>

<div class="auth-page">

    <!-- LEFT PANEL -->

    <div class="auth-left">

        <h1>College Student Life</h1>

        <h2>Everything a student needs in one place.</h2>

        <p>

            Tasks • Budget • Habits • Calendar • Notes • Religion • Schedule • Pomodoro • ...

        </p>

    </div>

    
    <!-- RIGHT PANEL -->

    <div class="auth-right">

        <!-- LOGIN -->

        <div id="loginPanel">

            <h2 data-i18n="login.title">Sign In</h2>

            <input
                id="loginEmail"
                type="email"
                placeholder="Email"
                data-i18n-placeholder="login.email">

            <input
                id="loginPassword"
                type="password"
                placeholder="Password"
                data-i18n-placeholder="login.password">

            <label class="remember">

                <input
                    id="rememberMe"
                    type="checkbox">

                Remember me

            </label>

            <button
                id="loginButton"
                data-i18n="login.login">
            
                Login
            
            </button>

            <div class="links">

                <a
                    href="#"
                    id="showSignup"
                    data-i18n="login.createAccount">
                
                    Create account
                
                </a>

                <a
                    href="#"
                    id="showForgot"
                    data-i18n="login.forgotPassword">
                
                    Forgot password?
                
                </a>

            </div>

        </div>

        <!-- SIGNUP -->

        <div id="signupPanel" class="hidden">

            <h2>Create Account</h2>

            <input
                id="signupName"
                type="text"
                placeholder="Full name"
                data-i18n-placeholder="signup.fullName">

            <input
                id="signupEmail"
                type="email"
                placeholder="Email"
                data-i18n-placeholder="login.email">

            <input
                id="signupPassword"
                type="password"
                placeholder="Password"
                data-i18n-placeholder="login.password">

            <input
                id="signupConfirm"
                type="password"
                placeholder="Confirm password"
                data-i18n-placeholder="signup.confirmPassword">

            <button id="signupButton">

                Create Account

            </button>

            <div class="links">

                <a href="#" id="showLogin">

                    Back to login

                </a>

            </div>

        </div>

        <!-- FORGOT -->

        <div id="forgotPanel" class="hidden">

            <h2>Reset Password</h2>

            <input
                id="forgotEmail"
                type="email"
                placeholder="Email"
                data-i18n-placeholder="login.email">

            <button id="forgotButton">

                Send Reset Link

            </button>

            <div class="links">

                <a href="#" id="showLogin2">

                    Back to login

                </a>

            </div>

        </div>

        <p id="authMessage"></p>

    </div>

</div>

<script type="module"
        src="assets/js/core/login.js"></script>

</body>

</html>
