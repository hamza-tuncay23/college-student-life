<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Schedule | College Student Life</title>

    <!-- Google Font -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS -->

    <link rel="stylesheet" href="assets/css/variables.css">
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/layout.css">
    <link rel="stylesheet" href="assets/css/sidebar.css">
    <link rel="stylesheet" href="assets/css/navbar.css">
    <link rel="stylesheet" href="assets/css/cards.css">
    <link rel="stylesheet" href="assets/css/buttons.css">
    <link rel="stylesheet" href="assets/css/schedule.css">
    <link rel="stylesheet" href="assets/css/responsive.css">

</head>

<body>

<div class="app">

    <aside id="sidebar"></aside>

    <main class="main-content">

        <header id="navbar"></header>

        <div class="page-content">

            <div class="page-header">

                <div class="page-title">
            
                    <h1>📚 Schedule</h1>
            
                    <p>Manage your weekly timetable</p>
            
                </div>
            
                <div class="page-actions">

                    <button class="secondary-button" id="subjectsBtn">
                
                        <i class="fa-solid fa-book"></i>
                
                        Subjects
                
                    </button>
                
                    <button class="secondary-button" id="teachersBtn">
                
                        <i class="fa-solid fa-user"></i>
                
                        Teachers
                
                    </button>
                
                    <button class="secondary-button" id="roomsBtn">
                
                        <i class="fa-solid fa-door-open"></i>
                
                        Rooms
                
                    </button>
                
                    <button class="secondary-button" id="timeSlotsBtn">
                
                        <i class="fa-solid fa-clock"></i>
                
                        Time Slots
                
                    </button>
                
                    <button class="secondary-button" id="settingsBtn">
                
                        <i class="fa-solid fa-gear"></i>
                
                        Settings
                
                    </button>
                
                </div>
            
            </div>

            <!-- TOP -->

            <div class="schedule-top">

                <div class="schedule-card">

                    <label>Semester</label>

                    <select id="semesterSelect">

                        <option value="1">Semester 1</option>

                        <option value="2">Semester 2</option>

                    </select>

                </div>

                <div class="schedule-card">

                    <label>Week</label>

                    <select id="weekType">

                        <option>Normal</option>

                        <option>Exam</option>

                        <option>Ramadan</option>

                    </select>

                </div>

                <div class="schedule-card">

                    <label>View</label>

                    <select>

                        <option>Weekly</option>

                    </select>

                </div>

            </div>

            <!-- TABLE -->

            <div class="schedule-wrapper">

                <div class="schedule-toolbar">
            
                    <button class="primary-button" id="addLessonBtn">
            
                        <i class="fa-solid fa-plus"></i>
            
                        Add Lesson
            
                    </button>
            
                    <input
                            id="scheduleSearch"
                            type="text"
                            placeholder="Search lesson...">
            
                </div>

                <table class="schedule-table">

                    <thead>

                    <tr>

                        <th>Day</th>

                        <th>08:00 - 10:00</th>

                        <th>10:00 - 12:00</th>

                        <th>14:00 - 16:00</th>

                        <th>16:00 - 18:00</th>

                    </tr>

                    </thead>

                    <tbody>

                    <tr>

                        <th>Monday</th>

                        <td id="Monday-1"></td>
                        <td id="Monday-2"></td>
                        <td id="Monday-3"></td>
                        <td id="Monday-4"></td>

                    </tr>

                    <tr>

                        <th>Tuesday</th>

                        <td id="Tuesday-1"></td>
                        <td id="Tuesday-2"></td>
                        <td id="Tuesday-3"></td>
                        <td id="Tuesday-4"></td>

                    </tr>

                    <tr>

                        <th>Wednesday</th>

                        <td id="Wednesday-1"></td>
                        <td id="Wednesday-2"></td>
                        <td id="Wednesday-3"></td>
                        <td id="Wednesday-4"></td>

                    </tr>

                    <tr>

                        <th>Thursday</th>

                        <td id="Thursday-1"></td>
                        <td id="Thursday-2"></td>
                        <td id="Thursday-3"></td>
                        <td id="Thursday-4"></td>

                    </tr>

                    <tr>

                        <th>Friday</th>

                        <td id="Friday-1"></td>
                        <td id="Friday-2"></td>
                        <td id="Friday-3"></td>
                        <td id="Friday-4"></td>

                    </tr>

                    <tr>

                        <th>Saturday</th>

                        <td id="Saturday-1"></td>
                        <td id="Saturday-2"></td>
                        <td id="Saturday-3"></td>
                        <td id="Saturday-4"></td>

                    </tr>

                    <tr>

                        <th>Sunday</th>

                        <td id="Sunday-1"></td>
                        <td id="Sunday-2"></td>
                        <td id="Sunday-3"></td>
                        <td id="Sunday-4"></td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </main>

</div>

<!-- ==========================================================
ADD / EDIT LESSON MODAL
========================================================== -->

<div id="lessonModal" class="modal">

    <div class="modal-content">

        <div class="modal-header">

            <h2>Add Lesson</h2>

            <button id="closeLessonModal">

                <i class="fa-solid fa-xmark"></i>

            </button>

        </div>

        <div class="modal-body">

            <div class="form-row">
        
                <div class="form-group">
        
                    <label>Subject *</label>
        
                    <select id="lessonSubject">
        
                        <option value="">Choose...</option>
        
                    </select>
        
                </div>
        
                <div class="form-group">
        
                    <label>Teacher</label>
        
                    <input type="text" id="lessonTeacher">
        
                </div>
        
            </div>
        
            <div class="form-row">
        
                <div class="form-group">
        
                    <label>Room</label>
        
                    <input type="text" id="lessonRoom">
        
                </div>
        
                <div class="form-group">
        
                    <label>Type</label>
        
                    <select id="lessonType">
        
                        <option>Course</option>
                        <option>TD</option>
                        <option>TP</option>
                        <option>Exam</option>
        
                    </select>
        
                </div>
        
            </div>
        
            <div class="form-group">
        
                <label>Color</label>
        
                <input type="color"
                       id="lessonColor"
                       value="#2563eb">
        
            </div>
        
        </div>

        <div class="modal-footer">

            <button
                    id="deleteLesson"
                    class="danger-button">
        
                <i class="fa-solid fa-trash"></i>
        
                Delete
        
            </button>
        
            <div>
        
                <button
                        id="cancelLesson"
                        class="secondary-button">
        
                    Cancel
        
                </button>
        
                <button
                        id="saveLesson"
                        class="primary-button">
        
                    <i class="fa-solid fa-floppy-disk"></i>
        
                    Save
        
                </button>
        
            </div>
        
        </div>

    </div>

</div>

<script type="module" src="assets/js/app.js"></script>
<script type="module" src="assets/js/schedule.js"></script>

<!-- ==========================================================
SUBJECTS MODAL
========================================================== -->

<div id="subjectsModal" class="modal">

    <div class="modal-content" style="width:900px;max-width:96%;">

        <div class="modal-header">

            <h2>Subjects</h2>

            <button id="closeSubjectsModal">

                <i class="fa-solid fa-xmark"></i>

            </button>

        </div>

        <div class="modal-body">

            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;gap:15px;flex-wrap:wrap;">

                <input
                        id="subjectSearch"
                        type="text"
                        placeholder="Search subject..."
                        style="flex:1;min-width:250px;">

                <button
                        id="newSubjectBtn"
                        class="primary-button">
                
                    <i class="fa-solid fa-circle-plus"></i>
                
                    New Subject
                
                </button>

            </div>

            <table class="subjects-table">

                <thead>

                <tr>

                    <th>Color</th>

                    <th>Subject</th>

                    <th>Teacher</th>

                    <th>Room</th>

                    <th></th>

                </tr>

                </thead>

                <tbody id="subjectsTableBody">

                </tbody>

            </table>

        </div>

    </div>

</div>
</body>

</html>
