<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Create Account | College Student Life</title>

    <link rel="stylesheet"
          href="assets/css/variables.css">

    <link rel="stylesheet"
          href="assets/css/auth.css">

</head>

<body>

<div class="auth-container">

    <div class="auth-card">

        <h1>Create Account</h1>

        <p>Create your College Student Life account.</p>

        <input
            type="text"
            id="fullName"
            placeholder="Full name">

        <input
            type="email"
            id="email"
            placeholder="Email">

        <input
            type="password"
            id="password"
            placeholder="Password">

        <input
            type="password"
            id="confirmPassword"
            placeholder="Confirm password">

        <button id="signupButton">

            Create Account

        </button>

        <p id="errorMessage"></p>

        <div class="auth-links">

            <a href="login.html">

                Already have an account?

            </a>

        </div>

    </div>

</div>

<script type="module"
        src="assets/js/core/signup.js"></script>

</body>

</html>
